<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGAS Bid Tab Analyser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --ink:#0d0d0d;--paper:#fafaf7;--accent:#1a3a5c;--accent2:#c8a96e;
  --muted:#6b6b6b;--border:#d8d4cc;--green:#1a7a4a;--red:#c0392b;
  --row-alt:#f3f1ec;--card:#fff;--shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:var(--paper);color:var(--ink);min-height:100vh}
a{color:var(--accent)}

/* ── Header ── */
header{background:var(--accent);color:#fff;padding:18px 32px;display:flex;align-items:center;gap:16px}
header h1{font-size:20px;font-weight:normal;letter-spacing:.04em}
header span{opacity:.55;font-size:13px;font-family:monospace}
.api-strip{background:#fffbe6;border-bottom:1px solid #e6d87a;padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:13px}
.api-strip input{flex:1;max-width:420px;padding:6px 10px;border:1px solid #d4c36a;border-radius:4px;font-family:monospace;font-size:12px}
.api-strip button{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px}
#api-status{font-size:12px;color:var(--muted)}

/* ── Layout ── */
.shell{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 88px)}
nav{border-right:1px solid var(--border);padding:20px 0}
nav h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 20px 8px}
nav .nav-item{display:block;padding:9px 20px;font-size:14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
nav .nav-item:hover{background:var(--row-alt)}
nav .nav-item.active{border-left-color:var(--accent2);background:var(--row-alt);font-weight:bold}
nav .nav-sep{height:1px;background:var(--border);margin:12px 0}
nav .upload-btn{margin:16px 20px 0;display:block;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;text-align:center;width:calc(100% - 40px)}
main{padding:28px 36px;overflow-y:auto}

/* ── Bid cards ── */
.bid-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
.bid-header h2{font-size:18px;font-weight:normal}
.bid-meta{font-size:12px;color:var(--muted)}

/* ── AGAS position badge ── */
.position-banner{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 18px;min-width:140px;box-shadow:var(--shadow)}
.pos-card .label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.pos-card .value{font-size:22px;font-weight:bold;color:var(--ink)}
.pos-card .sub{font-size:12px;color:var(--muted);margin-top:2px}
.pos-card.winner .value{color:var(--green)}
.pos-card.losing .value{color:var(--red)}

/* ── Line items table ── */
.line-section{margin-bottom:32px}
.line-section h3{font-size:14px;font-weight:bold;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.line-desc{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
th{text-align:left;padding:7px 10px;background:var(--accent);color:#fff;font-weight:normal;font-size:12px;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:nth-child(even) td{background:var(--row-alt)}
tr.agas-row td{background:#e8f4ee!important;font-weight:bold}
tr.winner-row td{background:#d4edda!important}
.rank-badge{display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:bold}
.rank-1{background:#c8a96e;color:#fff}
.rank-2{background:#b0b0b0;color:#fff}
.rank-3{background:#cd7f32;color:#fff}
.rank-n{background:#e8e8e8;color:#555}
.pct-above{color:var(--red);font-size:11px}
.pct-below{color:var(--green);font-size:11px}

/* ── Chart section ── */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:24px;box-shadow:var(--shadow)}
.chart-wrap h3{font-size:13px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
canvas{max-height:240px}

/* ── Price suggester ── */
.suggester{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;box-shadow:var(--shadow);margin-top:20px}
.suggester h3{font-size:14px;font-weight:bold;margin-bottom:14px}
.price-options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
.price-opt{text-align:center;padding:14px;border-radius:6px;border:1px solid var(--border)}
.price-opt .strat{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.price-opt .price{font-size:24px;font-weight:bold}
.price-opt .why{font-size:11px;color:var(--muted);margin-top:4px}
.price-opt.aggressive{background:#e8f4ee;border-color:#a8d5b8}
.price-opt.competitive{background:#e8f0f8;border-color:#a8bfe0}
.price-opt.premium{background:#fdf8ee;border-color:#e0d0a0}

/* ── Competitor analysis ── */
.comp-analysis{margin-top:24px}
.comp-analysis h3{font-size:14px;font-weight:bold;margin-bottom:14px}
.comp-table-wrap{overflow-x:auto}
.insight-box{background:#fff9e6;border:1px solid #e6d87a;border-radius:6px;padding:14px;margin-top:16px;font-size:13px;line-height:1.6}
.insight-box strong{color:var(--accent)}

/* ── Upload zone ── */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:40px;text-align:center;margin-bottom:24px;cursor:pointer;transition:.15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#f0f4f8}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
.upload-zone p{color:var(--muted);font-size:14px}

/* ── AI analysis ── */
.ai-btn{padding:10px 20px;background:var(--accent2);color:var(--accent);border:none;border-radius:4px;cursor:pointer;font-size:13px;font-family:Georgia,serif;font-weight:bold;margin-top:16px}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-result{background:#f8f9fa;border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:16px;font-size:13px;line-height:1.7;white-space:pre-wrap}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div>
    <h1>AGAS · Bid Tab Analyser</h1>
    <span>Competitive Intelligence & Pricing Tool</span>
  </div>
</header>

<div class="api-strip">
  <label for="api-key" style="white-space:nowrap;font-weight:bold">Anthropic API Key:</label>
  <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
  <button onclick="saveKey()">Save</button>
  <span id="api-status"></span>
</div>

<div class="shell">
  <nav>
    <h3>Library</h3>
    <div id="nav-list"></div>
    <div class="nav-sep"></div>
    <h3 style="margin-top:4px">Upload</h3>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">+ Add PDF / XLSX</button>
    <input type="file" id="file-input" accept=".pdf,.xlsx" multiple style="display:none" onchange="handleUpload(this.files)">
  </nav>
  <main id="main-content">
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📋</div>
      <p>Select a bid from the library, or drop a PDF / XLSX here</p>
      <p style="font-size:12px;margin-top:8px;color:#aaa">Supported: IonWave bid tabs, custom PDFs, price comparison spreadsheets</p>
    </div>
  </main>
</div>

const AGAS_NAMES = ['agas','a.g.a.s'];

// ── State ──────────────────────────────────────────────────────────────────
let currentBid = null;
let charts = [];

// ── API Key ────────────────────────────────────────────────────────────────
function saveKey(){
  const k=document.getElementById('api-key').value.trim();
  if(!k){return;}
  localStorage.setItem('agas_api_key',k);
  document.getElementById('api-status').textContent='✓ Key saved';
  document.getElementById('api-status').style.color='green';
}
function getKey(){return localStorage.getItem('agas_api_key')||'';}
window.addEventListener('load',()=>{
  const k=getKey();
  if(k){document.getElementById('api-key').value=k;document.getElementById('api-status').textContent='✓ Key loaded';document.getElementById('api-status').style.color='green';}
  buildNav();
});

// ── Nav ────────────────────────────────────────────────────────────────────
function buildNav(){
  const nl=document.getElementById('nav-list');
  nl.innerHTML='';
  Object.keys(LIBRARY).forEach(title=>{
    const d=document.createElement('div');
    d.className='nav-item';
    d.textContent=title;
    d.onclick=()=>loadBid(title);
    nl.appendChild(d);
  });
}

function setActive(title){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.textContent===title);
  });
}

// ── Load a bid ─────────────────────────────────────────────────────────────
function loadBid(title){
  setActive(title);
  currentBid={title, ...LIBRARY[title]};
  renderBid();
}

function isAGAS(name){
  const n=name.toLowerCase();
  return AGAS_NAMES.some(a=>n.includes(a));
}

function getRank(suppliers, supplier){
  const sorted=[...suppliers].sort((a,b)=>a.unit_price-b.unit_price);
  return sorted.findIndex(s=>s.supplier===supplier)+1;
}

function renderBid(){
  const bid=currentBid;
  charts.forEach(c=>c.destroy()); charts=[];

  let html=`
    <div class="bid-header">
      <h2>${bid.title}</h2>
      <div class="bid-meta">${bid.meta.org} &nbsp;·&nbsp; ${bid.meta.date} &nbsp;·&nbsp; ${bid.meta.type}</div>
    </div>`;

  // ── AGAS position summary across all lines ──
  const agasLines = bid.line_items.map(item=>{
    const agas=item.suppliers.find(s=>isAGAS(s.supplier));
    if(!agas) return null;
    const sorted=[...item.suppliers].sort((a,b)=>a.unit_price-b.unit_price);
    const rank=sorted.findIndex(s=>s.supplier===agas.supplier)+1;
    const low=sorted[0].unit_price;
    const pctAbove=((agas.unit_price-low)/low*100).toFixed(1);
    return {rank,total:item.suppliers.length,pct:pctAbove,price:agas.unit_price,line:item.line};
  }).filter(Boolean);

  if(agasLines.length>0){
    html+=`<div class="position-banner">`;
    agasLines.forEach(al=>{
      const cls=al.rank===1?'winner':al.rank<=3?'':'losing';
      html+=`<div class="pos-card ${cls}">
        <div class="label">Line ${al.line} — AGAS Rank</div>
        <div class="value">#${al.rank} of ${al.total}</div>
        <div class="sub">$${al.price.toFixed(2)} · ${al.pct}% above lowest</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ── Per-line breakdown ──
  bid.line_items.forEach((item,idx)=>{
    const sorted=[...item.suppliers].sort((a,b)=>a.unit_price-b.unit_price);
    const low=sorted[0].unit_price;
    const high=sorted[sorted.length-1].unit_price;
    const mid=sorted[Math.floor(sorted.length/2)].unit_price;

    html+=`<div class="line-section">
      <h3>Line ${item.line} — ${item.description.substring(0,80)}${item.description.length>80?'…':''}</h3>
      <div class="line-desc">${item.description}</div>
      <div class="chart-wrap"><h3>Price Comparison</h3><canvas id="chart-${idx}"></canvas></div>
      <table>
        <thead><tr><th>Rank</th><th>Supplier</th><th>Unit Price</th><th>Total / Extended</th><th>vs Lowest</th></tr></thead>
        <tbody>`;

    sorted.forEach((s,i)=>{
      const rank=i+1;
      const pct=((s.unit_price-low)/low*100).toFixed(1);
      const agas=isAGAS(s.supplier);
      const won=item.winner===s.supplier||s.winner;
      const rankBadgeClass=rank<=3?`rank-${rank}`:'rank-n';
      const pctHtml=rank===1?'<span style="color:var(--green)">— lowest</span>'
        :`<span class="pct-above">+${pct}%</span>`;
      html+=`<tr class="${agas?'agas-row':won?'winner-row':''}">
        <td><span class="rank-badge ${rankBadgeClass}">${rank}</span></td>
        <td>${s.supplier}${agas?' 🔷':won?' ✓':''}</td>
        <td><strong>$${s.unit_price.toFixed(2)}</strong></td>
        <td>${s.extended?'$'+s.extended.toLocaleString():'—'}</td>
        <td>${pctHtml}</td>
      </tr>`;
    });

    html+=`</tbody></table>`;

    // Price suggester
    const p10=sorted[Math.max(0,Math.floor(sorted.length*0.1))].unit_price;
    const p25=sorted[Math.max(0,Math.floor(sorted.length*0.25))].unit_price;
    const p40=sorted[Math.max(0,Math.floor(sorted.length*0.40))].unit_price;
    html+=`<div class="suggester">
      <h3>Suggested Pricing for Next Bid — Line ${item.line}</h3>
      <p style="font-size:12px;color:var(--muted)">Based on ${sorted.length} competitor bids. Range: $${low.toFixed(2)} – $${high.toFixed(2)} · Median: $${mid.toFixed(2)}</p>
      <div class="price-options">
        <div class="price-opt aggressive">
          <div class="strat">Aggressive (Win)</div>
          <div class="price">$${p10.toFixed(2)}</div>
          <div class="why">Top 10th percentile — maximises win rate</div>
        </div>
        <div class="price-opt competitive">
          <div class="strat">Competitive</div>
          <div class="price">$${p25.toFixed(2)}</div>
          <div class="why">Top 25th percentile — solid margin</div>
        </div>
        <div class="price-opt premium">
          <div class="strat">Value/Margin</div>
          <div class="price">$${p40.toFixed(2)}</div>
          <div class="why">40th percentile — emphasise quality</div>
        </div>
      </div>
    </div>`;

    html+=`</div>`; // end line-section
  });

  // ── Competitor analysis ──
  const allSuppliers={};
  bid.line_items.forEach(item=>{
    item.suppliers.forEach(s=>{
      if(!allSuppliers[s.supplier]) allSuppliers[s.supplier]={count:0,wins:0,prices:[]};
      allSuppliers[s.supplier].count++;
      allSuppliers[s.supplier].prices.push(s.unit_price);
      if(item.winner===s.supplier||s.winner) allSuppliers[s.supplier].wins++;
    });
  });

  const compRows=Object.entries(allSuppliers)
    .filter(([n])=>!isAGAS(n))
    .sort((a,b)=>b[1].count-a[1].count)
    .slice(0,12);

  if(compRows.length>1){
    html+=`<div class="comp-analysis">
      <h3>Competitor Overview</h3>
      <div class="comp-table-wrap">
      <table>
        <thead><tr><th>Competitor</th><th>Lines Bid</th><th>Wins</th><th>Avg Price</th></tr></thead>
        <tbody>`;
    compRows.forEach(([name,d])=>{
      const avg=(d.prices.reduce((a,b)=>a+b,0)/d.prices.length).toFixed(2);
      html+=`<tr><td>${name}</td><td>${d.count}</td><td>${d.wins||0}</td><td>$${avg}</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  // ── AI analysis button ──
  html+=`<div style="margin-top:24px">
    <button class="ai-btn" onclick="runAI()" id="ai-btn">🤖 AI Deep Analysis</button>
    <div id="ai-result"></div>
  </div>`;

  document.getElementById('main-content').innerHTML=html;

  // ── Render charts ──
  bid.line_items.forEach((item,idx)=>{
    const sorted=[...item.suppliers].sort((a,b)=>a.unit_price-b.unit_price);
    const ctx=document.getElementById(`chart-${idx}`);
    if(!ctx) return;
    const bgColors=sorted.map(s=>isAGAS(s.supplier)?'rgba(26,90,92,0.85)':'rgba(26,58,92,0.6)');
    const c=new Chart(ctx,{
      type:'bar',
      data:{
        labels:sorted.map(s=>s.supplier.length>20?s.supplier.substring(0,20)+'…':s.supplier),
        datasets:[{
          label:'Unit Price ($)',
          data:sorted.map(s=>s.unit_price),
          backgroundColor:bgColors,
          borderRadius:3
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()}}}
      }
    });
    charts.push(c);
  });
}

// ── AI Analysis ────────────────────────────────────────────────────────────
async function runAI(){
  const key=getKey();
  if(!key){alert('Add your Anthropic API key at the top first.');return;}
  if(!currentBid){return;}

  const btn=document.getElementById('ai-btn');
  const res=document.getElementById('ai-result');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Analysing…';
  res.innerHTML='';

  const summary=currentBid.line_items.map(item=>{
    const sorted=[...item.suppliers].sort((a,b)=>a.unit_price-b.unit_price);
    const agas=item.suppliers.find(s=>isAGAS(s.supplier));
    return `Line ${item.line}: ${item.description.substring(0,80)}
Competitors (sorted by price): ${sorted.map(s=>`${s.supplier} $${s.unit_price}`).join(', ')}
AGAS position: ${agas?`#${sorted.findIndex(s=>s.supplier===agas.supplier)+1} of ${sorted.length} at $${agas.unit_price}`:'not bidding'}`;
  }).join('\n\n');

  const prompt=`You are a competitive bidding analyst for AGAS Manufacturing Group, a US flag and banner manufacturer.

Analyse this bid tabulation and give AGAS specific, actionable intelligence:

BID: ${currentBid.title}
Organisation: ${currentBid.meta.org}
Type: ${currentBid.meta.type}

${summary}

Provide:
1. AGAS POSITION ASSESSMENT — how competitive are we on each line? What's our win probability?
2. KEY COMPETITORS — who are the real threats? Any patterns in their pricing?
3. PRICING STRATEGY — specific price points AGAS should target to win next time
4. PRODUCT/POSITIONING NOTES — any quality or spec advantages AGAS should emphasise
5. ONE KEY INSIGHT — the single most important thing AGAS should take away

Be direct, specific, and commercial. No padding.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content.map(b=>b.text||'').join('');
    res.innerHTML=`<div class="ai-result">${text}</div>`;
  }catch(e){
    res.innerHTML=`<div class="ai-result" style="color:red">Error: ${e.message}</div>`;
  }
  btn.disabled=false;
  btn.innerHTML='🤖 AI Deep Analysis';
}

// ── File Upload ────────────────────────────────────────────────────────────
function handleUpload(files){
  if(!files.length) return;
  const key=getKey();
  if(!key){alert('Add your API key first — it\'s needed to read uploaded bid tabs.');return;}
  Array.from(files).forEach(file=>processUpload(file,key));
}

async function processUpload(file, key){
  const m=document.getElementById('main-content');
  m.innerHTML=`<p style="padding:20px;color:var(--muted)">Reading <strong>${file.name}</strong>…</p>`;

  try{
    const base64=await fileToBase64(file);
    const isXlsx=file.name.endsWith('.xlsx');
    
    let prompt, msgContent;
    if(isXlsx){
      prompt=`This is a bid tabulation spreadsheet. Extract ALL line items and ALL supplier prices. Return as JSON: {"bid_title":"...","org":"...","date":"...","type":"...","line_items":[{"line":"1","description":"...","suppliers":[{"supplier":"name","unit_price":0.00,"extended":0.00,"qty":1}]}]}. Only return JSON.`;
      msgContent=[{type:'text',text:prompt},{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}}];
    } else {
      prompt=`This is a bid tabulation document. Extract ALL line items and ALL supplier prices listed. Return ONLY valid JSON: {"bid_title":"...","org":"...","date":"...","type":"Flags/Banners/Print/Promotional","line_items":[{"line":"1","description":"full description","suppliers":[{"supplier":"company name","unit_price":0.00,"extended":0.00,"qty":1,"winner":false}]}]}`;
      msgContent=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},{type:'text',text:prompt}];
    }

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:msgContent}]})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message);
    
    let text=data.content.map(b=>b.text||'').join('').trim();
    text=text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const parsed=JSON.parse(text);
    
    const title=`${parsed.bid_title||file.name} (uploaded)`;
    LIBRARY[title]={
      meta:{org:parsed.org||'Unknown',date:parsed.date||'',type:parsed.type||'Other'},
      line_items:parsed.line_items||[]
    };
    buildNav();
    loadBid(title);
  }catch(e){
    document.getElementById('main-content').innerHTML=
      `<div style="padding:20px;color:red">Failed to read file: ${e.message}<br><small>Make sure your API key is set and the file is a valid bid tab PDF or XLSX.</small></div>`;
  }
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ── Drag & drop ────────────────────────────────────────────────────────────
const dz=document.getElementById('drop-zone');
if(dz){
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleUpload(e.dataTransfer.files);});
}
</script>
